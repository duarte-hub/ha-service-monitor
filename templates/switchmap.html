<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Switch &amp; AP Clients</title>
  <style>
    :root { --primary:#1565c0; --bg:#0f1117; --surface:#1a1d27; --border:#2a2d3a; --text:#e2e8f0; --muted:#94a3b8; --up:#22c55e; --down:#ef4444; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; }

    .topbar { background:var(--primary); color:#fff; padding:0 24px; height:52px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; box-shadow:0 2px 12px rgba(0,0,0,.5); }
    .topbar-left { display:flex; align-items:center; gap:10px; font-size:1rem; font-weight:700; }
    .topbar-right { display:flex; gap:14px; align-items:center; font-size:.82rem; }
    .topbar-right a { color:rgba(255,255,255,.85); text-decoration:none; font-weight:500; }
    .topbar-right a:hover { color:#fff; }

    .toolbar { display:flex; gap:10px; align-items:center; padding:16px 24px; flex-wrap:wrap; }
    .toolbar input { background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:6px; padding:7px 12px; font-size:.85rem; width:260px; }
    .toolbar input:focus { outline:none; border-color:var(--primary); }
    .stat-pill { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:4px 12px; font-size:.8rem; color:var(--muted); }

    .grid { display:grid; grid-template-columns:1fr; gap:16px; padding:0 24px 32px; }

    .swcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
    .swcard-header { padding:11px 16px; display:flex; align-items:center; gap:9px; border-bottom:1px solid var(--border); background:rgba(255,255,255,.02); }
    .swcard-name { font-weight:700; font-size:.93rem; flex:1; min-width:0; }
    .swcard-badge { font-size:.68rem; font-weight:700; padding:2px 8px; border-radius:10px; text-transform:uppercase; flex-shrink:0; }
    .badge-switch { background:rgba(21,101,192,.3); color:#90caf9; }
    .badge-ap { background:rgba(76,175,80,.2); color:#81c784; }
    .swcard-count { font-size:.75rem; color:var(--muted); flex-shrink:0; }

    .client-table { width:100%; border-collapse:collapse; font-size:.82rem; }
    .client-table th { padding:5px 12px; text-align:left; color:var(--muted); font-weight:500; font-size:.74rem; border-bottom:1px solid var(--border); }
    .client-table td { padding:7px 12px; border-bottom:1px solid rgba(255,255,255,.035); vertical-align:middle; }
    .client-table tr:last-child td { border-bottom:none; }
    .client-table tr:hover td { background:rgba(255,255,255,.03); }

    .client-name a { color:var(--text); text-decoration:none; font-weight:600; }
    .client-name a:hover { color:#90caf9; }
    .client-name span { font-weight:600; }
    .client-ip { color:var(--muted); font-family:monospace; font-size:.77rem; }
    .client-mac { font-family:monospace; font-size:.75rem; color:var(--muted); }
    .client-vendor { font-size:.73rem; color:var(--muted); }
    .client-port { font-family:monospace; font-size:.77rem; max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .port-alias { font-size:.72rem; color:var(--muted); }

    .status-dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:5px; vertical-align:middle; }
    .status-dot.up { background:var(--up); box-shadow:0 0 4px var(--up); }
    .status-dot.down { background:var(--down); }
    .status-dot.unknown { background:var(--muted); }

    .dev-chip { display:inline-block; font-size:.72rem; font-weight:600; padding:2px 8px; border-radius:8px; white-space:nowrap; }
    .dev-chip-ap  { background:rgba(76,175,80,.15); color:#81c784; }
    .dev-chip-sw  { background:rgba(21,101,192,.15); color:#90caf9; }

    .sig-bar { display:flex; align-items:flex-end; gap:2px; height:14px; }
    .sig-bar span { width:4px; border-radius:1px; background:var(--border); }
    .sig-bar span.on { background:currentColor; }
    .sig-val { font-size:.75rem; font-family:monospace; white-space:nowrap; }
    .sig-label { font-size:.7rem; color:var(--muted); }
    .sig-wrap { display:flex; align-items:center; gap:6px; }
    .sig-excellent { color:#22c55e; }
    .sig-good      { color:#86efac; }
    .sig-fair      { color:#f59e0b; }
    .sig-poor      { color:#ef4444; }

    .empty-msg { padding:20px 16px; color:var(--muted); font-size:.85rem; text-align:center; }
    .no-data { padding:40px 24px; color:var(--muted); font-size:.9rem; }

    .port-actions { display:flex; gap:4px; }
    .port-btn { border:none; border-radius:5px; padding:3px 8px; font-size:.72rem; font-weight:600; cursor:pointer; white-space:nowrap; transition:opacity .15s; }
    .port-btn:disabled { opacity:.45; cursor:default; }
    .port-btn-bounce  { background:rgba(245,158,11,.15); color:#f59e0b; }
    .port-btn-bounce:hover:not(:disabled)  { background:rgba(245,158,11,.3); }
    .port-btn-disable { background:rgba(239,68,68,.12); color:#ef4444; }
    .port-btn-disable:hover:not(:disabled) { background:rgba(239,68,68,.25); }
    .port-btn-enable  { background:rgba(34,197,94,.12); color:#22c55e; }
    .port-btn-enable:hover:not(:disabled)  { background:rgba(34,197,94,.25); }
    .port-toast { position:fixed; bottom:24px; right:24px; background:#1e2130; border:1px solid var(--border); border-radius:8px; padding:10px 16px; font-size:.82rem; z-index:100; opacity:0; transition:opacity .2s; pointer-events:none; max-width:320px; }
    .port-toast.show { opacity:1; }
    .port-toast.ok   { border-color:#22c55e; color:#22c55e; }
    .port-toast.err  { border-color:#ef4444; color:#ef4444; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="8" width="20" height="8" rx="2"/>
      <circle cx="6" cy="12" r="1.2" fill="currentColor"/>
      <circle cx="10" cy="12" r="1.2" fill="currentColor"/>
      <circle cx="14" cy="12" r="1.2" fill="currentColor"/>
      <circle cx="18" cy="12" r="1.2" fill="currentColor"/>
    </svg>
    Switch &amp; AP Clients
  </div>
  <div class="topbar-right">
    <a href="/topology">Topology</a>
    <a href="/vulnerabilities">Vulns</a>
    <a href="/logs">Logs</a>
    <a href="/config">Settings</a>
    <a href="/">&#8592; Dashboard</a>
  </div>
</div>

<div class="toolbar">
  <input type="text" id="search" placeholder="Filter by name, IP, MAC, port&#x2026;" oninput="applyFilter()">
  <span class="stat-pill" id="stat-aps">&#x2014;</span>
  <span class="stat-pill" id="stat-switches">&#x2014;</span>
</div>

<div class="grid" id="grid"></div>
<div class="port-toast" id="port-toast"></div>

<script>
let _data = [];

async function load() {
  try {
    const r = await fetch('/api/switchmap');
    _data = await r.json();
    applyFilter();
  } catch(e) {
    document.getElementById('grid').innerHTML = '<p class="no-data">Failed to load data.</p>';
  }
}

function applyFilter() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  let filtered = _data;
  if (q) {
    filtered = [];
    for (const g of _data) {
      const matchGroup = g.name.toLowerCase().includes(q) || (g.ip||'').includes(q);
      const clients = g.clients.filter(c =>
        (c.name||'').toLowerCase().includes(q) ||
        (c.ip||'').includes(q) ||
        (c.mac||'').toLowerCase().includes(q) ||
        (c.port||'').toLowerCase().includes(q) ||
        (c.port_alias||'').toLowerCase().includes(q) ||
        (c.vendor||'').toLowerCase().includes(q)
      );
      if (matchGroup || clients.length)
        filtered.push({...g, clients: clients.length ? clients : (matchGroup ? g.clients : [])});
    }
  }
  render(filtered);
}

function dotCls(status) {
  return status === 'up' ? 'up' : status === 'down' ? 'down' : 'unknown';
}

function rssiLevel(rssi) {
  if (rssi >= -50) return 4; if (rssi >= -65) return 3; if (rssi >= -75) return 2; return 1;
}
function snrLevel(snr) {
  if (snr >= 40) return 4; if (snr >= 25) return 3; if (snr >= 15) return 2; return 1;
}
function levelCls(lvl) { return ['','sig-poor','sig-fair','sig-good','sig-excellent'][lvl] || ''; }
function sigBarsHtml(lvl) {
  return [5,8,11,14].map((h,i) => `<span style="height:${h}px" class="${i<lvl?'on':''}"></span>`).join('');
}

function signalCell(c) {
  const rssi = c.rssi != null ? c.rssi : null;
  const snr  = c.snr  != null ? c.snr  : null;
  if (rssi == null && snr == null) return '<span class="sig-label">—</span>';
  const lvl  = rssi != null ? rssiLevel(rssi) : snrLevel(snr);
  const cls  = levelCls(lvl);
  const rssiLabel = rssi != null ? (c.rssi_est ? `~${rssi} dBm` : `${rssi} dBm`) : null;
  let lines = '';
  if (rssiLabel) lines += `<div class="sig-val">${rssiLabel}</div>`;
  if (snr != null) lines += `<div class="sig-label">${snr} dB SNR</div>`;
  return `<div class="sig-wrap ${cls}"><div class="sig-bar">${sigBarsHtml(lvl)}</div><div>${lines}</div></div>`;
}

function speedCell(c) {
  if (c.speed != null) return `<span style="font-family:monospace;font-size:.8rem">${c.speed} Mbps</span>`;
  if (c.wifi_cap)      return `<span style="font-size:.78rem;color:var(--muted)">${c.wifi_cap}</span>`;
  return '<span class="sig-label">—</span>';
}

let _toastTimer = null;
function showToast(msg, ok) {
  const el = document.getElementById('port-toast');
  el.textContent = msg;
  el.className = `port-toast show ${ok ? 'ok' : 'err'}`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.classList.remove('show'); }, 8000);
}

async function portAction(btn, switchIp, ifIdx, action) {
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = action === 'bounce' ? '⟳ …' : action === 'disable' ? '⊘ …' : '▲ …';
  try {
    const r = await fetch('/api/snmp/port/action', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({switch_ip: switchIp, if_idx: ifIdx, action})
    });
    const d = await r.json();
    showToast(d.message || (d.ok ? 'Done' : 'Failed'), d.ok);
    if (action === 'bounce') {
      setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 6000);
      return;
    }
    if (action === 'disable') { btn.textContent = '▲ Enable'; btn.className = 'port-btn port-btn-enable'; btn.onclick = () => portAction(btn, switchIp, ifIdx, 'enable'); }
    else                      { btn.textContent = '⊘ Disable'; btn.className = 'port-btn port-btn-disable'; btn.onclick = () => portAction(btn, switchIp, ifIdx, 'disable'); }
    btn.disabled = false;
  } catch(e) {
    showToast('Request failed', false);
    btn.textContent = orig; btn.disabled = false;
  }
}

async function wirelessAction(btn, clientType, mac, merakiId, netId, apIp, action) {
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = '⟳ …';
  try {
    const r = await fetch('/api/wireless/client/action', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({client_type: clientType, mac, meraki_id: merakiId, net_id: netId, ap_ip: apIp, action})
    });
    const d = await r.json();
    showToast(d.message || (d.ok ? 'Done' : 'Failed'), d.ok);
    if (action === 'kick') {
      if (!d.ok) { btn.textContent = orig; btn.disabled = false; return; }
      // Countdown while Meraki pushes block config to AP (~90 s)
      let secs = 90;
      btn.textContent = `⟳ ${secs}s`;
      const iv = setInterval(() => {
        secs--;
        if (secs <= 0) { clearInterval(iv); btn.textContent = orig; btn.disabled = false; }
        else btn.textContent = `⟳ ${secs}s`;
      }, 1000);
      return;
    }
    if (action === 'block')   { btn.textContent = '▲ Unblock'; btn.className = 'port-btn port-btn-enable'; btn.onclick = () => wirelessAction(btn, clientType, mac, merakiId, netId, apIp, 'unblock'); }
    else                      { btn.textContent = '⊘ Block'; btn.className = 'port-btn port-btn-disable'; btn.onclick = () => wirelessAction(btn, clientType, mac, merakiId, netId, apIp, 'block'); }
    btn.disabled = false;
  } catch(e) {
    showToast('Request failed', false);
    btn.textContent = orig; btn.disabled = false;
  }
}

function portActionsHtml(c) {
  // Wired SNMP port
  if (c.if_idx && !c.is_wireless) {
    return `<div class="port-actions">
      <button class="port-btn port-btn-bounce"
        onclick="portAction(this,'${c.switch_ip}',${c.if_idx},'bounce')">⟳ Bounce</button>
      <button class="port-btn port-btn-disable"
        onclick="portAction(this,'${c.switch_ip}',${c.if_idx},'disable')">⊘ Disable</button>
    </div>`;
  }
  // SNMP AP wireless client — switch_ip is the AP's IP
  if (c.is_wireless && c.switch_ip && !c.client_type) {
    const mac = c.mac;
    const aip = c.switch_ip;
    return `<div class="port-actions">
      <button class="port-btn port-btn-bounce"
        onclick="wirelessAction(this,'aruba','${mac}','','','${aip}','kick')">⟳ Kick</button>
    </div>`;
  }
  // Wireless client (Meraki or Aruba Central)
  if (c.is_wireless && c.client_type) {
    const ct = c.client_type;
    const mid = c.meraki_id || '';
    const nid = c.net_id || '';
    const aip = c.ap_ip || '';
    const mac = c.mac;
    const canBlock = ct === 'meraki';
    const blockBtn = canBlock
      ? `<button class="port-btn port-btn-disable"
          onclick="wirelessAction(this,'${ct}','${mac}','${mid}','${nid}','${aip}','block')">⊘ Block</button>`
      : '';
    return `<div class="port-actions">
      <button class="port-btn port-btn-bounce"
        onclick="wirelessAction(this,'${ct}','${mac}','${mid}','${nid}','${aip}','kick')">⟳ Kick</button>
      ${blockBtn}
    </div>`;
  }
  return '';
}

const AP_ICON = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>`;
const SW_ICON = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="8" width="20" height="8" rx="2"/><circle cx="6" cy="12" r="1.2" fill="currentColor"/><circle cx="10" cy="12" r="1.2" fill="currentColor"/><circle cx="14" cy="12" r="1.2" fill="currentColor"/><circle cx="18" cy="12" r="1.2" fill="currentColor"/></svg>`;

function renderSection(type, groups) {
  const isAP = type === 'ap';

  const allClients = [];
  for (const g of groups) {
    for (const c of g.clients) allClients.push({...c, _devName: g.name, _devIp: g.ip});
  }
  allClients.sort((a, b) => {
    const d = a._devName.localeCompare(b._devName);
    return d !== 0 ? d : (a.port || a.ip || '').localeCompare(b.port || b.ip || '');
  });

  const hasSignal  = allClients.some(c => c.rssi != null || c.snr != null);
  const hasSpeed   = allClients.some(c => c.speed != null || c.wifi_cap);
  const hasActions = allClients.some(c =>
    (c.if_idx && !c.is_wireless) ||
    (c.is_wireless && c.switch_ip && !c.client_type) ||
    (c.is_wireless && c.client_type)
  );

  let rows = '';
  for (const c of allClients) {
    const dot      = `<span class="status-dot ${dotCls(c.status)}"></span>`;
    const nameCell = c.ip
      ? `<a href="/device/${c.ip}">${dot}${c.name || c.ip}</a>`
      : `<span>${dot}${c.name || c.mac}</span>`;
    const ipCell   = c.ip ? `<div class="client-ip">${c.ip}</div>` : '';
    const chipCls  = isAP ? 'dev-chip-ap' : 'dev-chip-sw';
    const devCell  = `<span class="dev-chip ${chipCls}" title="${c._devIp||''}">${c._devName}</span>`;
    const portCell = c.is_wireless
      ? ''
      : `<span class="client-port" title="${c.port}">${c.port}</span>${c.port_alias ? `<div class="port-alias">${c.port_alias}</div>` : ''}`;

    const sigTd  = hasSignal ? `<td>${signalCell(c)}</td>` : '';
    const spdTd  = hasSpeed  ? `<td>${speedCell(c)}</td>`  : '';
    const portTd = !isAP     ? `<td>${portCell}</td>`      : '';
    const actTd  = hasActions ? `<td>${portActionsHtml(c)}</td>` : '';

    rows += `<tr>
      <td><div class="client-name">${nameCell}</div>${ipCell}</td>
      <td><div class="client-mac">${c.mac}</div><div class="client-vendor">${c.vendor||''}</div></td>
      <td>${devCell}</td>
      ${portTd}${sigTd}${spdTd}${actTd}
    </tr>`;
  }

  const sigTh  = hasSignal  ? '<th>Signal</th>' : '';
  const spdTh  = hasSpeed   ? '<th>Speed</th>'  : '';
  const portTh = !isAP      ? '<th>Port</th>'   : '';
  const actTh  = hasActions ? '<th></th>'        : '';
  const devHdr = isAP ? 'AP' : 'Switch';
  const cnt    = allClients.length;
  const devCnt = groups.length;
  const icon   = isAP ? AP_ICON : SW_ICON;
  const title  = isAP ? 'Access Points' : 'Switches';
  const badgeCls = isAP ? 'badge-ap' : 'badge-switch';
  const badgeLbl = `${devCnt} ${isAP ? 'AP' : 'switch'}${devCnt===1?'':'s'}`;

  const body = rows
    ? `<table class="client-table"><thead><tr><th>Device</th><th>MAC / Vendor</th><th>${devHdr}</th>${portTh}${sigTh}${spdTh}${actTh}</tr></thead><tbody>${rows}</tbody></table>`
    : `<div class="empty-msg">No clients detected</div>`;

  return `<div class="swcard">
    <div class="swcard-header">
      ${icon}
      <span class="swcard-name">${title}</span>
      <span class="swcard-badge ${badgeCls}">${badgeLbl}</span>
      <span class="swcard-count">${cnt} client${cnt===1?'':'s'}</span>
    </div>
    ${body}
  </div>`;
}

function render(data) {
  const aps     = data.filter(g => g.type === 'ap');
  const switches = data.filter(g => g.type === 'switch');
  const apCnt   = aps.reduce((s, g) => s + g.clients.length, 0);
  const swCnt   = switches.reduce((s, g) => s + g.clients.length, 0);

  document.getElementById('stat-aps').textContent =
    `${aps.length} AP${aps.length===1?'':'s'} · ${apCnt} client${apCnt===1?'':'s'}`;
  document.getElementById('stat-switches').textContent =
    `${switches.length} switch${switches.length===1?'':'es'} · ${swCnt} client${swCnt===1?'':'s'}`;

  let html = '';
  if (aps.length)      html += renderSection('ap', aps);
  if (switches.length) html += renderSection('switch', switches);

  document.getElementById('grid').innerHTML = html
    || '<p class="no-data">No switch or AP data found. Run an SNMP bridge scan first.</p>';
}

load();
setInterval(load, 30000);
</script>
</body>
</html>
