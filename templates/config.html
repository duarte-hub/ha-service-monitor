<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HA Monitor — Settings</title>
  <style>
    :root { --bg:#111827; --card-bg:#1c1c1e; --border:rgba(225,225,225,.12); --text:#e1e1e1; --text-muted:#9b9b9b; --primary:#03a9f4; --green:#4caf50; --red:#db4437; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    .topbar { background:var(--primary); color:#fff; padding:0 24px; height:52px; display:flex; align-items:center; justify-content:space-between; font-size:1.1rem; font-weight:600; }
    .topbar a { color:#fff; text-decoration:none; font-size:.85rem; opacity:.85; }
    .topbar a:hover { opacity:1; }
    .content { padding:28px 24px; max-width:620px; }
    .section-title { font-size:.7rem; font-weight:600; margin-bottom:14px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.08em; }
    .card { background:var(--card-bg); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:20px; }
    .field { margin-bottom:14px; }
    .field:last-child { margin-bottom:0; }
    label { display:block; font-size:.78rem; color:var(--text-muted); margin-bottom:5px; }
    input[type="text"],input[type="password"],input[type="number"] { width:100%; background:rgba(255,255,255,.05); border:1px solid var(--border); border-radius:7px; color:var(--text); font-size:.88rem; padding:8px 11px; outline:none; transition:border-color .15s; }
    input:focus { border-color:var(--primary); }
    .show-pass { font-size:.72rem; color:var(--primary); cursor:pointer; margin-top:4px; display:inline-block; }
    .btn-row { margin-top:18px; display:flex; gap:10px; align-items:center; }
    .btn { padding:8px 18px; border-radius:8px; font-size:.85rem; font-weight:600; cursor:pointer; border:none; transition:opacity .15s; }
    .btn:hover { opacity:.85; }
    .btn-primary { background:var(--primary); color:#fff; }
    .btn-secondary { background:rgba(255,255,255,.08); color:var(--text); border:1px solid var(--border); }
    .status-msg { font-size:.82rem; }
    .status-msg.ok  { color:var(--green); }
    .status-msg.err { color:var(--red); }
  </style>
</head>
<body>

<div class="topbar">
  <span>Settings</span>
  <a href="/">&larr; Dashboard</a>
</div>

<div class="content">

  <div class="section-title">Alert Settings</div>
  <div class="card">
    <div class="field">
      <label>Notification title prefix (used in push title and email subject)</label>
      <input type="text" id="alert_title" placeholder="HA Monitor">
    </div>
    <div class="field">
      <label>Alert cooldown (seconds between repeat alerts for the same issue)</label>
      <input type="number" id="alert_cooldown" min="0" style="width:110px">
    </div>
    <div class="field" style="display:flex;align-items:center;justify-content:space-between;">
      <label style="margin:0">Notify when a device or port comes back online</label>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin:0">
        <input type="checkbox" id="notify_recovery" onchange="saveRecoveryToggle()" style="width:auto;accent-color:var(--primary)">
        <span id="recovery-toggle-label" style="font-size:.82rem;color:var(--text-muted)">Off</span>
      </label>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveAlertSettings()">Save</button>
      <span class="status-msg" id="alert-settings-status"></span>
    </div>
  </div>

  <div class="section-title">Push Notifications</div>
  <div class="card">
    <div class="field" style="display:flex;align-items:center;justify-content:space-between;">
      <label style="margin:0">Send push notifications when a service goes down</label>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin:0">
        <input type="checkbox" id="push_alerts_enabled" onchange="savePushToggle()" style="width:auto;accent-color:var(--primary)">
        <span id="push-toggle-label" style="font-size:.82rem;color:var(--text-muted)">Off</span>
      </label>
    </div>
  </div>
  <div class="card">
    <div class="field">
      <label>HA notify service (e.g. notify.mobile_app_iphone)</label>
      <input type="text" id="notify_service" placeholder="notify.mobile_app_iphone">
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="savePush()">Save</button>
      <button class="btn btn-secondary" onclick="testPush()">Send test</button>
      <span class="status-msg" id="push-status"></span>
    </div>
  </div>

  <div class="section-title">Email Alerts</div>
  <div class="card">
    <div class="field" style="display:flex;align-items:center;justify-content:space-between;">
      <label style="margin:0">Send email alerts when a service goes down</label>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin:0">
        <input type="checkbox" id="email_alerts_enabled" onchange="saveEmailToggle()" style="width:auto;accent-color:var(--primary)">
        <span id="email-toggle-label" style="font-size:.82rem;color:var(--text-muted)">Off</span>
      </label>
    </div>
  </div>
  <div class="card">
    <div class="field">
      <label>SMTP host (e.g. smtp.gmail.com)</label>
      <input type="text" id="smtp_host">
    </div>
    <div class="field">
      <label>SMTP port</label>
      <input type="number" id="smtp_port" min="1" max="65535" style="width:100px">
    </div>
    <div class="field">
      <label>SMTP user</label>
      <input type="text" id="smtp_user" autocomplete="username">
    </div>
    <div class="field">
      <label>SMTP password / app password</label>
      <input type="password" id="smtp_pass" autocomplete="current-password">
      <span class="show-pass" onclick="togglePass()">show</span>
    </div>
    <div class="field">
      <label>From address</label>
      <input type="text" id="email_from">
    </div>
    <div class="field">
      <label>To address (alert recipient)</label>
      <input type="text" id="email_to">
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveEmail()">Save</button>
      <button class="btn btn-secondary" onclick="testEmail()">Send test email</button>
      <span class="status-msg" id="email-status"></span>
    </div>
  </div>

</div>

<script>
  async function loadConfig() {
    try {
      const r = await fetch('/api/config');
      const d = await r.json();
      set('alert_title',    d.alert_title    || 'HA Monitor');
      set('alert_cooldown', d.alert_cooldown || '300');
      set('notify_service', d.notify_service || '');
      set('smtp_host',      d.smtp_host      || '');
      set('smtp_port',      d.smtp_port      || '587');
      set('smtp_user',      d.smtp_user      || '');
      set('email_from',     d.email_from     || '');
      set('email_to',       d.email_to       || '');
      const pushOn = String(d.push_alerts_enabled ?? 'true').toLowerCase() !== 'false';
      document.getElementById('push_alerts_enabled').checked = pushOn;
      document.getElementById('push-toggle-label').textContent = pushOn ? 'On' : 'Off';
      const emailOn = String(d.email_alerts_enabled).toLowerCase() === 'true';
      document.getElementById('email_alerts_enabled').checked = emailOn;
      document.getElementById('email-toggle-label').textContent = emailOn ? 'On' : 'Off';
      const recoveryOn = String(d.notify_recovery).toLowerCase() === 'true';
      document.getElementById('notify_recovery').checked = recoveryOn;
      document.getElementById('recovery-toggle-label').textContent = recoveryOn ? 'On' : 'Off';
    } catch (_) {}
  }

  async function savePushToggle() {
    const on = document.getElementById('push_alerts_enabled').checked;
    document.getElementById('push-toggle-label').textContent = on ? 'On' : 'Off';
    await post({push_alerts_enabled: String(on)});
  }

  async function saveEmailToggle() {
    const on = document.getElementById('email_alerts_enabled').checked;
    document.getElementById('email-toggle-label').textContent = on ? 'On' : 'Off';
    await post({email_alerts_enabled: String(on)});
  }

  async function saveRecoveryToggle() {
    const on = document.getElementById('notify_recovery').checked;
    document.getElementById('recovery-toggle-label').textContent = on ? 'On' : 'Off';
    await post({notify_recovery: String(on)});
  }

  async function saveAlertSettings() {
    await post({alert_title: val('alert_title'), alert_cooldown: val('alert_cooldown')});
    flash('alert-settings-status', 'Saved', 'ok');
  }

  async function savePush() {
    await post({notify_service: val('notify_service')});
    flash('push-status', 'Saved', 'ok');
  }

  async function saveEmail() {
    const payload = {smtp_host: val('smtp_host'), smtp_port: val('smtp_port'),
                     smtp_user: val('smtp_user'), email_from: val('email_from'),
                     email_to:  val('email_to')};
    const p = val('smtp_pass'); if (p) payload.smtp_pass = p;
    await post(payload);
    flash('email-status', 'Saved', 'ok');
  }

  async function testPush() {
    const r = await fetch('/api/test_push', {method:'POST'});
    const d = await r.json();
    flash('push-status', d.ok ? 'Sent!' : 'Error: ' + d.error, d.ok ? 'ok' : 'err');
  }

  async function testEmail() {
    flash('email-status', 'Sending…', '');
    const r = await fetch('/api/test_email', {method:'POST'});
    const d = await r.json();
    flash('email-status', d.ok ? 'Sent!' : 'Error: ' + d.error, d.ok ? 'ok' : 'err');
  }

  async function post(payload) {
    await fetch('/api/config', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
  }
  function val(id) { return document.getElementById(id).value; }
  function set(id, v) { const el = document.getElementById(id); if (el) el.value = v; }
  function flash(id, msg, cls) {
    const el = document.getElementById(id);
    el.textContent = msg; el.className = 'status-msg ' + cls;
    setTimeout(() => { el.textContent = ''; el.className = 'status-msg'; }, 4000);
  }
  function togglePass() { const el = document.getElementById('smtp_pass'); el.type = el.type === 'password' ? 'text' : 'password'; }

  loadConfig();
</script>
</body>
</html>
