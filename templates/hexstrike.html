<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HexStrike Results</title>
  <style>
    :root { --primary:#1565c0; --bg:#0f1117; --surface:#1a1d27; --border:#2a2d3a; --text:#e2e8f0; --muted:#94a3b8;
            --red:#ef4444; --orange:#f97316; --yellow:#f59e0b; --green:#22c55e; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; }

    .topbar { background:var(--primary); color:#fff; padding:0 24px; height:52px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; box-shadow:0 2px 12px rgba(0,0,0,.5); }
    .topbar-left { display:flex; align-items:center; gap:10px; font-size:1rem; font-weight:700; }
    .topbar-right { display:flex; gap:14px; align-items:center; font-size:.82rem; }
    .topbar-right a { color:rgba(255,255,255,.85); text-decoration:none; font-weight:500; }
    .topbar-right a:hover { color:#fff; }
    .topbar-right a.active { color:#fff; border-bottom:2px solid rgba(255,255,255,.7); padding-bottom:1px; }

    .toolbar { display:flex; gap:10px; align-items:center; padding:16px 24px; flex-wrap:wrap; border-bottom:1px solid var(--border); }
    .toolbar input { background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:6px; padding:7px 12px; font-size:.85rem; width:260px; }
    .toolbar input:focus { outline:none; border-color:var(--primary); }
    .stat-pill { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:4px 12px; font-size:.8rem; color:var(--muted); white-space:nowrap; }
    .btn { border:none; border-radius:6px; padding:7px 14px; font-size:.82rem; font-weight:600; cursor:pointer; transition:opacity .15s; white-space:nowrap; }
    .btn-red { background:rgba(220,38,38,.18); border:1px solid rgba(220,38,38,.4); color:#f87171; }
    .btn-red:hover { background:rgba(220,38,38,.32); }
    .btn-red:disabled { opacity:.35; cursor:not-allowed; }
    .btn-muted { background:var(--surface); border:1px solid var(--border); color:var(--muted); }
    .btn-muted:hover { color:var(--text); border-color:var(--muted); }
    @keyframes hs-pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .content { padding:24px; }

    .unconfigured { text-align:center; padding:80px 24px; color:var(--muted); }
    .unconfigured h2 { font-size:1.1rem; color:var(--text); margin-bottom:8px; }
    .unconfigured p { font-size:.88rem; max-width:420px; margin:0 auto; line-height:1.6; }
    .unconfigured code { background:var(--surface); border:1px solid var(--border); padding:2px 6px; border-radius:4px; font-size:.82rem; color:#90caf9; }

    /* ── Result grid ─────────────────────────────────────────────────────── */
    .result-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:16px; }

    .rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; transition:border-color .15s; }
    .rcard:hover { border-color:rgba(255,255,255,.18); }
    .rcard.risk-critical { border-left:3px solid var(--red); }
    .rcard.risk-high     { border-left:3px solid var(--orange); }
    .rcard.risk-medium   { border-left:3px solid var(--yellow); }
    .rcard.risk-low      { border-left:3px solid var(--green); }
    .rcard.scanning      { border-left:3px solid #6366f1; animation:hs-pulse 1.4s ease-in-out infinite; }

    .rcard-header { padding:12px 14px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border); }
    .rcard-ip { font-family:monospace; font-size:.92rem; font-weight:700; flex:1; }
    .rcard-hostname { font-size:.75rem; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:180px; }
    .risk-badge { font-size:.68rem; font-weight:800; padding:2px 8px; border-radius:10px; text-transform:uppercase; letter-spacing:.06em; flex-shrink:0; }
    .risk-badge.critical { background:rgba(239,68,68,.2); color:#fca5a5; border:1px solid rgba(239,68,68,.35); }
    .risk-badge.high     { background:rgba(249,115,22,.2); color:#fdba74; border:1px solid rgba(249,115,22,.35); }
    .risk-badge.medium   { background:rgba(245,158,11,.2); color:#fde68a; border:1px solid rgba(245,158,11,.35); }
    .risk-badge.low      { background:rgba(34,197,94,.15); color:#86efac; border:1px solid rgba(34,197,94,.3); }
    .risk-badge.unknown  { background:rgba(148,163,184,.1); color:var(--muted); border:1px solid var(--border); }
    .risk-badge.scanning { background:rgba(99,102,241,.15); color:#a5b4fc; border:1px solid rgba(99,102,241,.3); }

    .rcard-body { padding:12px 14px; display:flex; flex-direction:column; gap:8px; }

    .rcard-row { display:flex; gap:6px; flex-wrap:wrap; align-items:baseline; }
    .rcard-label { font-size:.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; min-width:80px; flex-shrink:0; }
    .rcard-val { font-size:.82rem; }

    .port-chip { display:inline-block; font-size:.72rem; font-family:monospace; background:rgba(255,255,255,.06); border:1px solid var(--border); border-radius:4px; padding:1px 5px; margin:1px 2px 1px 0; }
    .tech-chip { display:inline-block; font-size:.7rem; background:rgba(21,101,192,.18); border:1px solid rgba(21,101,192,.3); color:#90caf9; border-radius:4px; padding:1px 6px; margin:1px 2px 1px 0; }

    .score-bar-wrap { flex:1; }
    .score-bar { height:5px; border-radius:3px; background:rgba(255,255,255,.08); overflow:hidden; margin-top:3px; }
    .score-bar-fill { height:100%; border-radius:3px; transition:width .4s; }

    .rcard-ts { font-size:.69rem; color:var(--muted2,#6b7280); margin-top:2px; }
    .rcard-error { font-size:.77rem; color:#fca5a5; background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.2); border-radius:6px; padding:6px 10px; }

    .port-table { width:100%; border-collapse:collapse; font-size:.78rem; margin-top:2px; }
    .port-table th { color:var(--muted); font-weight:500; font-size:.68rem; text-transform:uppercase; letter-spacing:.05em; padding:2px 6px; text-align:left; border-bottom:1px solid var(--border); }
    .port-table td { padding:3px 6px; border-bottom:1px solid rgba(255,255,255,.03); font-family:monospace; vertical-align:top; }
    .port-table tr:last-child td { border-bottom:none; }
    .port-num  { color:#93c5fd; white-space:nowrap; }
    .port-svc  { color:var(--text); }
    .port-ver  { color:var(--muted); font-size:.74rem; }

    .nmap-toggle { font-size:.72rem; color:var(--muted); cursor:pointer; user-select:none; padding:4px 0; display:inline-block; }
    .nmap-toggle:hover { color:var(--text); }
    .nmap-raw { font-family:monospace; font-size:.72rem; color:#94a3b8; background:rgba(0,0,0,.3); border:1px solid var(--border); border-radius:6px; padding:8px 10px; margin-top:4px; white-space:pre-wrap; word-break:break-all; max-height:260px; overflow-y:auto; display:none; }

    .rcard-actions { padding:8px 14px 12px; display:flex; gap:6px; flex-wrap:wrap; }
    .rcard-btn { border:none; border-radius:5px; padding:4px 10px; font-size:.72rem; font-weight:600; cursor:pointer; transition:opacity .15s; white-space:nowrap; }
    .rcard-btn-rescan   { background:rgba(220,38,38,.15); color:#f87171; border:1px solid rgba(220,38,38,.3); }
    .rcard-btn-rescan:hover   { background:rgba(220,38,38,.3); }
    .rcard-btn-nuclei   { background:rgba(139,92,246,.15); color:#c4b5fd; border:1px solid rgba(139,92,246,.3); }
    .rcard-btn-nuclei:hover   { background:rgba(139,92,246,.3); }
    .rcard-btn-nikto    { background:rgba(245,158,11,.12); color:#fcd34d; border:1px solid rgba(245,158,11,.3); }
    .rcard-btn-nikto:hover    { background:rgba(245,158,11,.25); }
    .rcard-btn-masscan  { background:rgba(239,68,68,.12); color:#fca5a5; border:1px solid rgba(239,68,68,.3); }
    .rcard-btn-masscan:hover  { background:rgba(239,68,68,.25); }
    .rcard-btn-httpx    { background:rgba(6,182,212,.12); color:#67e8f9; border:1px solid rgba(6,182,212,.3); }
    .rcard-btn-httpx:hover    { background:rgba(6,182,212,.25); }
    .rcard-btn-wafw00f  { background:rgba(234,179,8,.12); color:#fde047; border:1px solid rgba(234,179,8,.3); }
    .rcard-btn-wafw00f:hover  { background:rgba(234,179,8,.25); }
    .rcard-btn-gobuster { background:rgba(34,197,94,.12); color:#86efac; border:1px solid rgba(34,197,94,.3); }
    .rcard-btn-gobuster:hover { background:rgba(34,197,94,.25); }
    .rcard-btn-ffuf     { background:rgba(168,85,247,.12); color:#d8b4fe; border:1px solid rgba(168,85,247,.3); }
    .rcard-btn-ffuf:hover     { background:rgba(168,85,247,.25); }
    .rcard-btn-katana   { background:rgba(251,146,60,.12); color:#fed7aa; border:1px solid rgba(251,146,60,.3); }
    .rcard-btn-katana:hover   { background:rgba(251,146,60,.25); }
    .rcard-btn:disabled { opacity:.35; cursor:not-allowed; }
    .rcard-btn-device   { background:rgba(255,255,255,.06); color:var(--muted); border:1px solid var(--border); }
    .rcard-btn-device:hover   { color:var(--text); border-color:var(--muted); }
    .rcard-actions-divider { width:100%; height:0; border-top:1px solid var(--border); margin:2px 0; }

    .findings-section { margin-top:6px; }
    .findings-header { font-size:.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:4px; display:flex; align-items:center; gap:6px; }
    .finding-badge { font-size:.65rem; font-weight:700; padding:1px 5px; border-radius:8px; }
    .finding-badge.critical { background:rgba(239,68,68,.2); color:#fca5a5; }
    .finding-badge.high     { background:rgba(249,115,22,.2); color:#fdba74; }
    .finding-badge.medium   { background:rgba(245,158,11,.2); color:#fde68a; }
    .finding-badge.low      { background:rgba(34,197,94,.15); color:#86efac; }
    .finding-badge.info     { background:rgba(148,163,184,.1); color:var(--muted); }
    .finding-item { font-size:.74rem; color:var(--text); padding:3px 0; border-bottom:1px solid rgba(255,255,255,.04); font-family:monospace; line-height:1.4; word-break:break-word; }
    .finding-item:last-child { border-bottom:none; }
    .findings-scanning { font-size:.76rem; color:#a5b4fc; animation:hs-pulse 1.2s ease-in-out infinite; }

    .empty-msg { text-align:center; padding:60px 24px; color:var(--muted); font-size:.9rem; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    HexStrike
  </div>
  <div class="topbar-right">
    <a href="/topology">Topology</a>
    <a href="/switchmap">Clients</a>
    <a href="/ipam">IPAM</a>
    <a href="/vulnerabilities">Vulns</a>
    <a href="/hexstrike" class="active">HexStrike</a>
    <a href="/logs">Logs</a>
    <a href="/config">Settings</a>
    <a href="/">&#8592; Dashboard</a>
  </div>
</div>

<div class="toolbar">
  <input type="text" id="search" placeholder="Filter by IP, hostname, service&#x2026;" oninput="render()">
  <button class="btn btn-red" id="btn-scan-all" onclick="scanAll()">⚡ Scan All</button>
  <button class="btn btn-muted" onclick="clearAll()" title="Clear all results">Clear</button>
  <span class="stat-pill" id="pill-total">0 results</span>
  <span class="stat-pill" id="pill-scanning" style="display:none">⚡ scanning…</span>
</div>

<div class="content" id="content">
  <div class="empty-msg" id="empty">Loading…</div>
</div>

<script>
  let _results = {};
  let _scanning         = new Set();
  let _nucleiScanning   = new Set();
  let _niktoScanning    = new Set();
  let _masscanScanning  = new Set();
  let _httpxScanning    = new Set();
  let _wafw00fScanning  = new Set();
  let _gobusterScanning = new Set();
  let _ffufScanning     = new Set();
  let _katanaScanning   = new Set();
  let _configured = false;
  let _pollTimer = null;

  async function load() {
    const d = await fetch('/api/hexstrike/results').then(r => r.json());
    _results          = d.results           || {};
    _scanning         = new Set(d.scanning         || []);
    _nucleiScanning   = new Set(d.nuclei_scanning  || []);
    _niktoScanning    = new Set(d.nikto_scanning   || []);
    _masscanScanning  = new Set(d.masscan_scanning || []);
    _httpxScanning    = new Set(d.httpx_scanning   || []);
    _wafw00fScanning  = new Set(d.wafw00f_scanning || []);
    _gobusterScanning = new Set(d.gobuster_scanning|| []);
    _ffufScanning     = new Set(d.ffuf_scanning    || []);
    _katanaScanning   = new Set(d.katana_scanning  || []);
    _configured       = d.configured || false;
    render();
    schedulePoll();
  }

  function schedulePoll() {
    clearTimeout(_pollTimer);
    const busy = _scanning.size + _nucleiScanning.size + _niktoScanning.size +
                 _masscanScanning.size + _httpxScanning.size + _wafw00fScanning.size +
                 _gobusterScanning.size + _ffufScanning.size + _katanaScanning.size;
    if (busy > 0) _pollTimer = setTimeout(load, 2500);
  }

  async function scanAll() {
    const btn = document.getElementById('btn-scan-all');
    btn.disabled = true;
    const d = await fetch('/api/hexstrike/scan_all', {method:'POST'}).then(r => r.json());
    if (!d.ok) { alert('HexStrike: ' + (d.error || 'error')); btn.disabled = false; return; }
    await load();
    btn.disabled = false;
  }

  async function rescan(ip) {
    const d = await fetch('/api/hexstrike/scan', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ip})}).then(r => r.json());
    if (!d.ok) { alert('HexStrike: ' + (d.error || 'error')); return; }
    await load();
  }

  async function clearAll() {
    if (!confirm('Clear all HexStrike results?')) return;
    _results = {};
    render();
  }

  async function _runTool(tool, ip, scanSet) {
    const d = await fetch(`/api/hexstrike/${tool}`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ip})}).then(r => r.json());
    if (!d.ok) { alert(`${tool}: ` + (d.error || 'error')); return; }
    scanSet.add(ip);
    render();
    schedulePoll();
  }

  const runNuclei   = ip => _runTool('nuclei',   ip, _nucleiScanning);
  const runNikto    = ip => _runTool('nikto',    ip, _niktoScanning);
  const runMasscan  = ip => _runTool('masscan',  ip, _masscanScanning);
  const runHttpx    = ip => _runTool('httpx',    ip, _httpxScanning);
  const runWafw00f  = ip => _runTool('wafw00f',  ip, _wafw00fScanning);
  const runGobuster = ip => _runTool('gobuster', ip, _gobusterScanning);
  const runFfuf     = ip => _runTool('ffuf',     ip, _ffufScanning);
  const runKatana   = ip => _runTool('katana',   ip, _katanaScanning);

  function fmtTs(ts) {
    if (!ts) return '';
    return new Date(ts * 1000).toLocaleString();
  }

  function _findingBadge(line) {
    const l = line.toLowerCase();
    if (l.includes('critical')) return 'critical';
    if (l.includes('high'))     return 'high';
    if (l.includes('medium'))   return 'medium';
    if (l.includes('low'))      return 'low';
    return 'info';
  }

  function buildFindingsSection(label, toolData, isScanning, useMonoItems) {
    if (isScanning) return `<div class="findings-section"><div class="findings-header">${label} <span class="findings-scanning">scanning…</span></div></div>`;
    if (!toolData || !toolData.status || toolData.status === 'idle') return '';
    const findings = toolData.findings || [];
    const err = toolData.error || '';
    const ts  = toolData.ts   || 0;
    let body = '';
    if (err && findings.length === 0) {
      body = `<div class="rcard-error" style="margin-top:4px">⚠ ${err.replace(/</g,'&lt;')}</div>`;
    } else if (findings.length === 0) {
      body = `<div style="font-size:.76rem;color:var(--muted);padding:2px 0">No findings</div>`;
    } else {
      body = findings.slice(0, 40).map(f => {
        const badge = useMonoItems ? '' : `<span class="finding-badge ${_findingBadge(f)}">${_findingBadge(f)}</span> `;
        return `<div class="finding-item">${badge}${f.replace(/</g,'&lt;')}</div>`;
      }).join('') + (findings.length > 40 ? `<div style="font-size:.72rem;color:var(--muted);padding:2px 0">+${findings.length-40} more</div>` : '');
    }
    const tsStr = ts ? ` · ${fmtTs(ts)}` : '';
    return `<div class="findings-section">
      <div class="findings-header">${label} <span style="font-weight:400;color:var(--muted)">${findings.length} result${findings.length!==1?'s':''}${tsStr}</span></div>
      ${body}
    </div>`;
  }

  function buildCard(ip, r, isScanning) {
    const profile  = (r && r.profile) || {};
    const risk     = (profile.risk_level || (isScanning ? 'scanning' : 'unknown')).toLowerCase();
    const ports    = profile.open_ports || [];
    const services = profile.services   || {};
    const osInfo   = profile.os_info    || '';
    const rawOut   = (r && r.nmap_output) || '';
    const error    = (r && r.error) || '';
    const ts       = (r && r.ts)    || 0;
    const cardId   = 'card-' + ip.replace(/\./g, '_');
    const WEB_PORTS = [80,443,8080,8443,8888,9090,9200,3000,4848,5000,7001,7443];
    const hasWeb   = ports.some(p => WEB_PORTS.includes(p));

    // Scanning states
    const sc = {
      nuclei:   _nucleiScanning.has(ip),   nikto:    _niktoScanning.has(ip),
      masscan:  _masscanScanning.has(ip),  httpx:    _httpxScanning.has(ip),
      wafw00f:  _wafw00fScanning.has(ip),  gobuster: _gobusterScanning.has(ip),
      ffuf:     _ffufScanning.has(ip),     katana:   _katanaScanning.has(ip),
    };

    // Port table
    let portRows = '';
    for (const p of ports) {
      const svcFull = services[p] || services[String(p)] || '';
      const [svcName, ...verParts] = svcFull.split(' ');
      portRows += `<tr>
        <td class="port-num">${p}/tcp</td>
        <td class="port-svc">${svcName||''}</td>
        <td class="port-ver">${verParts.join(' ')}</td></tr>`;
    }
    const portSection = ports.length
      ? `<table class="port-table"><thead><tr><th>Port</th><th>Service</th><th>Version</th></tr></thead><tbody>${portRows}</tbody></table>`
      : (isScanning ? '' : '<div style="font-size:.78rem;color:var(--muted);padding:2px 0">No open ports found</div>');

    const rawSection = rawOut
      ? `<span class="nmap-toggle" onclick="toggleRaw('${cardId}')">▶ Raw nmap output</span>
         <div class="nmap-raw" id="${cardId}-raw">${rawOut.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`
      : '';

    // Tool result sections
    const sections = [
      buildFindingsSection('masscan',   r&&r.masscan,   sc.masscan,  true),
      buildFindingsSection('httpx',     r&&r.httpx,     sc.httpx,    true),
      buildFindingsSection('wafw00f',   r&&r.wafw00f,   sc.wafw00f,  true),
      buildFindingsSection('Nuclei',    r&&r.nuclei,    sc.nuclei,   false),
      buildFindingsSection('Nikto',     r&&r.nikto,     sc.nikto,    true),
      buildFindingsSection('gobuster',  r&&r.gobuster,  sc.gobuster, true),
      buildFindingsSection('ffuf',      r&&r.ffuf,      sc.ffuf,     true),
      buildFindingsSection('katana',    r&&r.katana,    sc.katana,   true),
    ].filter(Boolean).join('');

    // Buttons
    const dis = (active) => active || isScanning ? 'disabled' : '';
    const row1 = `
      <button class="rcard-btn rcard-btn-rescan"  onclick="rescan('${ip}')"   ${dis(false)}>⚡ ${isScanning?'Scanning…':'Re-scan'}</button>
      <button class="rcard-btn rcard-btn-masscan" onclick="runMasscan('${ip}')" ${dis(sc.masscan)}>${sc.masscan?'↯ Scanning…':'↯ Masscan'}</button>
      <button class="rcard-btn rcard-btn-httpx"   onclick="runHttpx('${ip}')"  ${dis(sc.httpx)}>${sc.httpx?'≋ Scanning…':'≋ httpx'}</button>`;
    const row2 = hasWeb || Object.values(sc).some(Boolean) || (r && (r.nuclei||r.nikto||r.wafw00f||r.gobuster||r.ffuf||r.katana)) ? `
      <div class="rcard-actions-divider"></div>
      <button class="rcard-btn rcard-btn-nuclei"   onclick="runNuclei('${ip}')"   ${dis(sc.nuclei)}>${sc.nuclei?'⬡ Scanning…':'⬡ Nuclei'}</button>
      <button class="rcard-btn rcard-btn-nikto"    onclick="runNikto('${ip}')"    ${dis(sc.nikto)}>${sc.nikto?'⚑ Scanning…':'⚑ Nikto'}</button>
      <button class="rcard-btn rcard-btn-wafw00f"  onclick="runWafw00f('${ip}')"  ${dis(sc.wafw00f)}>${sc.wafw00f?'🛡 Scanning…':'🛡 WAF'}</button>
      <button class="rcard-btn rcard-btn-gobuster" onclick="runGobuster('${ip}')" ${dis(sc.gobuster)}>${sc.gobuster?'📁 Scanning…':'📁 Dirs'}</button>
      <button class="rcard-btn rcard-btn-ffuf"     onclick="runFfuf('${ip}')"     ${dis(sc.ffuf)}>${sc.ffuf?'⚡ Scanning…':'⚡ Fuzz'}</button>
      <button class="rcard-btn rcard-btn-katana"   onclick="runKatana('${ip}')"   ${dis(sc.katana)}>${sc.katana?'🕷 Scanning…':'🕷 Crawl'}</button>` : '';

    return `<div class="rcard risk-${risk}${isScanning?' scanning':''}" id="${cardId}">
  <div class="rcard-header">
    <span class="rcard-ip">${ip}</span>
    ${osInfo ? `<span class="rcard-hostname" title="OS">${osInfo}</span>` : ''}
    <span class="risk-badge ${risk}">${isScanning?'⚡ scanning':risk}</span>
  </div>
  <div class="rcard-body">
    ${error ? `<div class="rcard-error">⚠ ${error}</div>` : ''}
    ${portSection}
    ${sections}
    ${rawSection}
    ${ts ? `<div class="rcard-ts">nmap ${fmtTs(ts)} · ${ports.length} open port${ports.length!==1?'s':''}</div>` : ''}
  </div>
  <div class="rcard-actions">
    ${row1}
    ${row2}
    <button class="rcard-btn rcard-btn-device" onclick="location.href='/device/${ip}'">Device →</button>
  </div>
</div>`;
  }

  function toggleRaw(cardId) {
    const el  = document.getElementById(cardId + '-raw');
    const tog = el.previousElementSibling;
    const open = el.style.display === 'block';
    el.style.display = open ? 'none' : 'block';
    tog.textContent  = tog.textContent.replace(open?'▼':'▶', open?'▶':'▼');
  }

  function render() {
    const q = (document.getElementById('search').value || '').toLowerCase();

    if (!_configured) {
      document.getElementById('content').innerHTML = `
        <div class="unconfigured">
          <h2>HexStrike not configured</h2>
          <p>Set <code>HEXSTRIKE_URL</code> or <code>HS_CONTAINER_NAME</code> in <a href="/config" style="color:#90caf9">Settings → HexStrike</a> to enable scanning.</p>
        </div>`;
      return;
    }

    const allIps = new Set([...Object.keys(_results), ..._scanning]);
    let cards = [];
    for (const ip of allIps) {
      const r = _results[ip];
      const isScanning = _scanning.has(ip);
      const profile = (r && r.profile) || {};
      const haystack = [ip, profile.os_info||'', ...Object.values(profile.services||{})].join(' ').toLowerCase();
      if (q && !haystack.includes(q)) continue;
      cards.push({ip, r, isScanning, risk: profile.risk_level||(isScanning?'scanning':'unknown')});
    }

    const order = {critical:0, high:1, medium:2, low:3, scanning:4, unknown:5};
    cards.sort((a,b) => (order[a.risk]??5) - (order[b.risk]??5) || a.ip.localeCompare(b.ip));

    document.getElementById('pill-total').textContent = cards.length === 1 ? '1 result' : `${cards.length} results`;

    const allScanning = [_scanning, _nucleiScanning, _niktoScanning, _masscanScanning,
                         _httpxScanning, _wafw00fScanning, _gobusterScanning, _ffufScanning, _katanaScanning];
    const busy = allScanning.reduce((n,s) => n+s.size, 0);
    const scanPill = document.getElementById('pill-scanning');
    if (busy > 0) {
      scanPill.style.display = '';
      const parts = [
        _scanning.size       && `${_scanning.size} nmap`,
        _nucleiScanning.size && `${_nucleiScanning.size} nuclei`,
        _niktoScanning.size  && `${_niktoScanning.size} nikto`,
        _masscanScanning.size && `${_masscanScanning.size} masscan`,
        _httpxScanning.size  && `${_httpxScanning.size} httpx`,
        _gobusterScanning.size && `${_gobusterScanning.size} dirs`,
        _ffufScanning.size   && `${_ffufScanning.size} fuzz`,
        _katanaScanning.size && `${_katanaScanning.size} crawl`,
        _wafw00fScanning.size && `${_wafw00fScanning.size} waf`,
      ].filter(Boolean);
      scanPill.textContent = `⚡ ${parts.join(', ')} scanning…`;
    } else {
      scanPill.style.display = 'none';
    }

    const content = document.getElementById('content');
    if (cards.length === 0) {
      content.innerHTML = `<div class="empty-msg">${q ? 'No results match.' : 'No scans yet — click <strong>⚡ Scan All</strong> or scan individual devices.'}</div>`;
      return;
    }
    content.innerHTML = `<div class="result-grid">${cards.map(c => buildCard(c.ip, c.r, c.isScanning)).join('')}</div>`;
  }

  load();
</script>
</body>
</html>
