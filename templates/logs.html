<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farol — Logs</title>
  <style>
    :root { --bg:#111827; --card-bg:#1c1c1e; --border:rgba(225,225,225,.12); --text:#e1e1e1; --text-muted:#9b9b9b; --primary:#03a9f4; --green:#4caf50; --red:#db4437; --yellow:#ff9800; --purple:#bb86fc; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }
    .topbar { background:var(--primary); color:#fff; padding:0 24px; height:52px; display:flex; align-items:center; justify-content:space-between; font-size:1.1rem; font-weight:600; flex-shrink:0; }
    .topbar-right { display:flex; gap:14px; align-items:center; font-size:.82rem; }
    .topbar a { color:#fff; text-decoration:none; opacity:.85; }
    .topbar a:hover { opacity:1; }
    .toolbar { padding:10px 20px; background:var(--card-bg); border-bottom:1px solid var(--border); display:flex; gap:8px; align-items:center; flex-wrap:wrap; flex-shrink:0; }
    .toolbar input { background:rgba(255,255,255,.05); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:.82rem; padding:5px 10px; outline:none; width:200px; }
    .toolbar input:focus { border-color:var(--primary); }
    .btn { background:rgba(255,255,255,.07); border:1px solid var(--border); color:var(--text); border-radius:6px; padding:5px 12px; font-size:.8rem; cursor:pointer; white-space:nowrap; }
    .btn:hover { background:rgba(255,255,255,.12); }
    .btn.active { background:var(--primary); border-color:var(--primary); color:#fff; }
    .btn.active-err  { background:var(--red);    border-color:var(--red);    color:#fff; }
    .btn.active-warn { background:var(--yellow);  border-color:var(--yellow); color:#111; }
    .btn.active-debug{ background:var(--purple);  border-color:var(--purple); color:#fff; }
    .btn.active-verbose { background:#e91e63; border-color:#e91e63; color:#fff; }
    .sep { width:1px; height:20px; background:var(--border); }
    .log-wrap { flex:1; overflow-y:auto; padding:10px 20px; font-family:'SF Mono','Fira Code',monospace; font-size:.76rem; line-height:1.5; }
    .line { padding:1px 0; white-space:pre-wrap; word-break:break-all; border-bottom:1px solid rgba(255,255,255,.02); }
    .line.debug { color:rgba(155,155,155,.45); }
    .line.info  { color:var(--text-muted); }
    .line.warn  { color:var(--yellow); }
    .line.err   { color:var(--red); }
    .status { font-size:.75rem; opacity:.7; }
    #scroll-btn { position:fixed; bottom:20px; right:20px; background:var(--primary); color:#fff; border:none; border-radius:20px; padding:7px 16px; font-size:.8rem; cursor:pointer; display:none; box-shadow:0 2px 8px rgba(0,0,0,.4); }
  </style>
</head>
<body>

<div class="topbar">
  <span>Logs</span>
  <div class="topbar-right">
    <span class="status" id="status">loading…</span>
    <a href="/config">Settings</a>
    <a href="/">&larr; Dashboard</a>
  </div>
</div>

<div class="toolbar">
  <input type="text" id="filter" placeholder="Filter…" oninput="renderLines()">
  <div class="sep"></div>
  <button class="btn" id="btn-err"   onclick="toggleLevelFilter('err')">Errors</button>
  <button class="btn" id="btn-warn"  onclick="toggleLevelFilter('warn')">Warnings</button>
  <button class="btn" id="btn-debug" onclick="toggleLevelFilter('debug')">Debug</button>
  <div class="sep"></div>
  <button class="btn" id="btn-verbose" onclick="toggleVerbose()">Verbose: off</button>
  <button class="btn" id="btn-tail"    onclick="toggleTail()">Tail: on</button>
  <button class="btn" onclick="clearAll()">Clear filter</button>
</div>

<div class="log-wrap" id="log-wrap"></div>
<button id="scroll-btn" onclick="scrollToBottom()">&#8595; Bottom</button>

<script>
  let allLines  = [];
  let tailing   = true;
  let verbose   = false;
  let showOnly  = new Set(); // active level filters (show ONLY these)

  const wrap      = document.getElementById('log-wrap');
  const filterEl  = document.getElementById('filter');
  const statusEl  = document.getElementById('status');
  const scrollBtn = document.getElementById('scroll-btn');

  wrap.addEventListener('scroll', () => {
    const atBottom = wrap.scrollHeight - wrap.scrollTop - wrap.clientHeight < 40;
    scrollBtn.style.display = atBottom ? 'none' : 'block';
  });

  function scrollToBottom() { wrap.scrollTop = wrap.scrollHeight; }

  function levelOf(line) {
    if (line.includes('[ERROR]'))   return 'err';
    if (line.includes('[WARNING]')) return 'warn';
    if (line.includes('[DEBUG]'))   return 'debug';
    return 'info';
  }

  function renderLines() {
    const q = filterEl.value.toLowerCase();
    const frag = document.createDocumentFragment();
    for (const l of allLines) {
      const lvl = levelOf(l);
      if (showOnly.size && !showOnly.has(lvl)) continue;
      if (q && !l.toLowerCase().includes(q)) continue;
      const div = document.createElement('div');
      div.className = 'line ' + lvl;
      div.textContent = l;
      frag.appendChild(div);
    }
    wrap.innerHTML = '';
    wrap.appendChild(frag);
    if (tailing) scrollToBottom();
  }

  function toggleTail() {
    tailing = !tailing;
    const btn = document.getElementById('btn-tail');
    btn.textContent = 'Tail: ' + (tailing ? 'on' : 'off');
    btn.className = 'btn' + (tailing ? ' active' : '');
    if (tailing) scrollToBottom();
  }

  function toggleLevelFilter(lvl) {
    if (showOnly.has(lvl)) showOnly.delete(lvl);
    else showOnly.add(lvl);
    const btn = document.getElementById('btn-' + lvl);
    const activeClass = {err:'active-err', warn:'active-warn', debug:'active-debug'}[lvl] || 'active';
    btn.className = 'btn' + (showOnly.has(lvl) ? ' ' + activeClass : '');
    renderLines();
  }

  async function toggleVerbose() {
    verbose = !verbose;
    const btn = document.getElementById('btn-verbose');
    btn.textContent = 'Verbose: ' + (verbose ? 'on' : 'off');
    btn.className = 'btn' + (verbose ? ' active-verbose' : '');
    await fetch('/api/logs/level', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({verbose}),
    });
  }

  function clearAll() {
    filterEl.value = '';
    showOnly.clear();
    ['err','warn','debug'].forEach(lvl => {
      document.getElementById('btn-' + lvl).className = 'btn';
    });
    renderLines();
  }

  async function poll() {
    try {
      const r = await fetch('/api/logs?n=2000');
      const d = await r.json();
      const prev = allLines.length;
      allLines = d.lines;
      // Sync verbose button with backend state
      if (verbose !== d.verbose) {
        verbose = d.verbose;
        const btn = document.getElementById('btn-verbose');
        btn.textContent = 'Verbose: ' + (verbose ? 'on' : 'off');
        btn.className = 'btn' + (verbose ? ' active-verbose' : '');
      }
      statusEl.textContent = allLines.length + ' lines';
      if (allLines.length !== prev) renderLines();
    } catch (_) { statusEl.textContent = 'error'; }
  }

  // Initial button states
  document.getElementById('btn-tail').className = 'btn active';

  poll();
  setInterval(poll, 3000);
</script>
</body>
</html>
