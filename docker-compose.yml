version: "3.8"

services:
  ha-monitor:
    build: .
    container_name: ha-service-monitor
    restart: unless-stopped
    ports:
      - "9099:9099"
    environment:
      # === REQUIRED ===
      HA_URL: "http://192.168.0.20:8123"
      HA_TOKEN: "${HA_TOKEN}"

      # === POLLING ===
      POLL_INTERVAL: "30"              # seconds between checks

      # === EMAIL ALERTS (optional) ===
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "587"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASS: "${SMTP_PASS}"
      EMAIL_FROM: "${EMAIL_FROM}"
      EMAIL_TO: "${EMAIL_TO}"
      ALERT_COOLDOWN: "300"

      # === ADD-ON SLUGS (defaults should work) ===
      # ZWAVE_ADDON_SLUG: "a0d7b954_zwavejs2mqtt"
      # Z2M_ADDON_SLUG: "45df7312_zigbee2mqtt"
      # Z2M_EDGE_ADDON_SLUG: "45df7312_zigbee2mqtt_edge"
      # MQTT_ADDON_SLUG: "core_mosquitto"
    volumes:
      # Host path bind mount — survives container rebuilds and Docker resets.
      # Unraid:  /mnt/user/appdata/ha-service-monitor:/data
      # Other:   ./data:/data  (creates a local data/ folder next to this file)
      - ${DATA_DIR:-/mnt/user/appdata/ha-service-monitor}:/data
